name: Semgrep CI
on:
  # Scan changed files in PRs:
  pull_request: {}
  # Scan on-demand through GitHub Actions interface:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - .github/workflows/semgrep.yml
  schedule:
    - cron: 0 1 * * *

permissions:
  contents: read

jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest

    container:
      # A Docker image with Semgrep installed. Do not change this.
      image: semgrep/semgrep

    # Skip any PR created by dependabot to avoid permission issues:
    if: (github.actor != 'dependabot[bot]')

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history needed for baseline commit comparison
          fetch-depth: 0

      # Diff-aware scan on PRs: only report findings new in this PR.
      # Fails the check if new findings are introduced.
      - name: Run Semgrep (PR diff scan)
        if: github.event_name == 'pull_request'
        run: semgrep scan --config auto --config .semgrep/rules/ --baseline-commit ${{ github.event.pull_request.base.sha }}

      # Full scan for scheduled runs, pushes, and manual triggers.
      # continue-on-error so pre-existing findings don't permanently red this job.
      - name: Run Semgrep (full scan)
        if: github.event_name != 'pull_request'
        run: semgrep scan --config auto --config .semgrep/rules/
        continue-on-error: true
